<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
        :root {
            --ink:        #101826;
            --slate:      #45526b;
            --mist:       #eef1f6;
            --line:       #dde2ec;
            --paper:      #ffffff;
            --accent:     #1f6f5c;
            --accent-dark:#154f41;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }

        body {
            font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
            background: var(--ink);
            color: var(--ink);
        }

        .container {
            width: 100%;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.25rem;
            background:
                radial-gradient(circle at 15% 20%, rgba(31, 111, 92, 0.35), transparent 45%),
                radial-gradient(circle at 85% 80%, rgba(31, 111, 92, 0.25), transparent 50%),
                var(--ink);
        }

        .form-box {
            width: 100%;
            max-width: 400px;
            background: var(--paper);
            border-radius: 12px;
            padding: 2.5rem 2.25rem;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.35);
        }

        .form-box h1 {
            margin: 0 0 0.35rem;
            font-size: 1.75rem;
            font-weight: 700;
        }

        .form-box > p {
            margin: 0 0 2rem;
            color: var(--slate);
            font-size: 0.95rem;
        }

        .input-box {
            margin-bottom: 1.3rem;
        }

        .input-box label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--slate);
            margin-bottom: 0.4rem;
        }

        .input-box input {
            width: 100%;
            padding: 0.7rem 0.9rem;
            font-size: 0.95rem;
            color: var(--ink);
            background: #f7f9fc;
            border: 1px solid var(--line);
            border-radius: 8px;
            outline: none;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }

        .input-box input::placeholder {
            color: #9aa5b8;
        }

        .input-box input:focus-visible {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(31, 111, 92, 0.15);
        }

        form button[type="submit"] {
            width: 100%;
            padding: 0.75rem;
            margin-top: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s ease;
        }

        form button[type="submit"]:hover,
        form button[type="submit"]:focus-visible {
            background: var(--accent-dark);
        }

        .login-link {
            margin-top: 1.75rem;
            text-align: center;
            font-size: 0.9rem;
            color: var(--slate);
        }

        .login-link a {
            color: var(--accent);
            font-weight: 600;
            text-decoration: none;
        }

        .login-link a:hover,
        .login-link a:focus-visible {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .form-box {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <div class="form-box">

        <h1>Login</h1>
        <p>Welcome back</p>

        <form action="/login" method="POST">

            <div class="input-box">
                <label>Email</label>
                <input
                    type="email"
                    name="email"
                    placeholder="Enter email"
                    required>
            </div>

            <div class="input-box">
                <label>Password</label>
                <input
                    type="password"
                    name="password"
                    placeholder="Enter password"
                    required>
            </div>

            <button type="submit">
                Login
            </button>

        </form>

        <div class="login-link">
            Don't have an account?
            <a href="/signup">Signup</a>
        </div>

    </div>

</div>

</body>
</html>
